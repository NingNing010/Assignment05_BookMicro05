{% extends "store/store_base.html" %}
{% block title %}{{ product_id }} — Chi tiết sản phẩm{% endblock %}
{% block nav_products %}active{% endblock %}

{% block extra_css %}
<style>
    .book-detail {
        max-width: 1320px;
        margin: 0 auto;
        padding: 36px 24px;
        display: grid;
        grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
        gap: 32px;
        align-items: start;
    }

    .book-cover-large {
        aspect-ratio: 3/4;
        border-radius: var(--radius);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 4.2rem;
        box-shadow: var(--shadow-lg);
        position: sticky;
        top: 84px;
        overflow: hidden;
    }

    .book-info {
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 28px;
        box-shadow: var(--shadow);
        padding-top: 24px;
    }

    .book-category-breadcrumb {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.82rem;
        color: var(--text-muted);
        margin-bottom: 12px;
    }

    .book-category-breadcrumb a { color: var(--blue); }
    .book-category-breadcrumb a:hover { text-decoration: underline; }

    .book-title-large {
        font-size: 2rem;
        font-weight: 800;
        color: var(--text-dark);
        margin-bottom: 8px;
        line-height: 1.25;
    }

    .book-author-large {
        font-size: 1rem;
        color: var(--text-muted);
        margin-bottom: 20px;
    }

    .book-price-large {
        font-size: 2.2rem;
        font-weight: 900;
        color: var(--accent);
        margin-bottom: 6px;
    }

    .book-price-large .currency { font-size: 1.2rem; font-weight: 500; }

    .book-stock-info {
        font-size: 0.88rem;
        margin-bottom: 28px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .book-actions {
        display: flex;
        gap: 12px;
        margin-bottom: 32px;
    }

    .book-meta-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 28px;
    }

    .meta-item {
        background: var(--bg-light);
        padding: 16px;
        border-radius: var(--radius-sm);
    }

    .meta-item .meta-label {
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
        font-weight: 600;
        margin-bottom: 4px;
    }

    .meta-item .meta-value {
        font-size: 0.95rem;
        font-weight: 600;
        color: var(--text-dark);
    }

    .book-description {
        margin-top: 24px;
        padding-top: 24px;
        border-top: 1px solid var(--border);
    }

    .book-description h3 {
        font-size: 1rem;
        font-weight: 700;
        margin-bottom: 12px;
    }

    .book-description p {
        font-size: 0.92rem;
        line-height: 1.8;
        color: var(--text-body);
    }

    /* Reviews section */
    .reviews-section {
        margin-top: 32px;
        padding-top: 28px;
        border-top: 1px solid var(--border);
    }

    .reviews-section h3 {
        font-size: 1rem;
        font-weight: 700;
        margin-bottom: 16px;
    }

    .review-card {
        background: var(--bg-light);
        border-radius: var(--radius-sm);
        padding: 16px 20px;
        margin-bottom: 12px;
    }

    .review-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
    }

    .review-stars { color: var(--gold); font-size: 0.9rem; }
    .review-customer { font-size: 0.82rem; color: var(--text-muted); }
    .review-comment { font-size: 0.88rem; color: var(--text-body); line-height: 1.6; }

    .review-form-card {
        background: var(--bg-white);
        border: 2px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
        margin-top: 20px;
    }

    .star-select {
        display: flex;
        gap: 4px;
        margin-bottom: 12px;
    }

    .star-select span {
        font-size: 1.5rem;
        cursor: pointer;
        transition: transform 0.15s;
        opacity: 0.3;
    }

    .star-select span.active { opacity: 1; }
    .star-select span:hover { transform: scale(1.2); }

    .qty-control {
        display: flex;
        align-items: center;
        gap: 0;
        border: 2px solid var(--border);
        border-radius: var(--radius-sm);
        overflow: hidden;
        width: fit-content;
    }

    .qty-control button {
        width: 42px;
        height: 42px;
        border: none;
        background: var(--bg-light);
        font-size: 1.1rem;
        cursor: pointer;
        transition: background 0.2s;
        font-family: inherit;
        color: var(--text-dark);
    }

    .qty-control button:hover { background: var(--border); }

    .qty-control input {
        width: 50px;
        height: 42px;
        border: none;
        text-align: center;
        font-size: 0.95rem;
        font-weight: 600;
        font-family: inherit;
        outline: none;
        color: var(--text-dark);
    }

    @media (max-width: 768px) {
        .book-detail { grid-template-columns: 1fr; padding: 18px; }
        .book-cover-large { position: static; max-width: 320px; margin: 0 auto; }
        .book-info { padding: 22px; }
    }
</style>
{% endblock %}

{% block content %}
<div class="book-detail" id="bookDetail">
    <div class="spinner" style="grid-column:1/-1"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const PRODUCT_ID = Number('{{ product_id }}');
    let selectedRating = 5;

    async function loadBook() {
        try {
            const [book, reviewsRes] = await Promise.all([
                apiCall(`/api/proxy/products/${PRODUCT_ID}/`),
                fetch(`/api/proxy/reviews/book/${PRODUCT_ID}/`).then(r => r.ok ? r.json() : [])
            ]);

            const reviews = Array.isArray(reviewsRes) ? reviewsRes : [];
            const stockClass = book.stock > 5 ? 'in-stock' : book.stock > 0 ? 'low-stock' : 'out-of-stock';
            const stockText = book.stock > 5 ? '✅ Còn hàng' : book.stock > 0 ? `⚠️ Chỉ còn ${book.stock} sản phẩm` : '❌ Hết hàng';
            const stockColor = book.stock > 5 ? 'var(--green)' : book.stock > 0 ? 'var(--orange)' : 'var(--accent)';
            const gradIdx = PRODUCT_ID % 6 + 1;
            
            const name = book.name || book.title || 'Sản phẩm';
            const subtitle = book.brand_name ? `🏢 ${book.brand_name}` : (book.author ? `✍️ ${book.author}` : `📌 ${book.category_name||''}`);

            // Dynamic Attribute Rendering
            let attributesHTML = '';
            if (book.attributes && typeof book.attributes === 'object') {
                for (const [key, val] of Object.entries(book.attributes)) {
                    if (!val) continue;
                    // Format key nicely (e.g., 'ram' -> 'RAM', 'skin_type' -> 'Skin Type')
                    const formattedKey = key.replace(/_/g, ' ').replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.substr(1).toLowerCase());
                    attributesHTML += `
                        <div class="meta-item">
                            <div class="meta-label">${formattedKey}</div>
                            <div class="meta-value">${val}</div>
                        </div>
                    `;
                }
            }

            document.getElementById('bookDetail').innerHTML = `
                <div class="book-cover-large grad-${gradIdx}">
                    ${book.image_url ? `<img src="${book.image_url}" alt="${name}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;display:block" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">` : ''}
                    <div style="display:${book.image_url ? 'none' : 'flex'};width:100%;height:100%;align-items:center;justify-content:center">🛍️</div>
                </div>
                <div class="book-info">
                    <div class="book-category-breadcrumb">
                        <a href="/store/">Trang chủ</a> › <a href="/store/products/">Sản phẩm</a>
                        ${book.category_name ? ` › <span>${book.category_name}</span>` : ''}
                    </div>
                    <h1 class="book-title-large">${name}</h1>
                    <div class="book-author-large">${subtitle}</div>
                    <div class="book-price-large">${formatPrice(book.price)} <span class="currency">₫</span></div>
                    <div class="book-stock-info">
                        <span class="tag ${stockClass === 'in-stock' ? 'tag-green' : stockClass === 'low-stock' ? 'tag-orange' : 'tag-red'}">${stockText}</span>
                    </div>

                    <div class="book-actions">
                        <div class="qty-control">
                            <button onclick="changeQty(-1)">−</button>
                            <input type="number" id="qtyInput" value="1" min="1" max="${book.stock || 99}">
                            <button onclick="changeQty(1)">+</button>
                        </div>
                        <button class="btn btn-primary btn-lg" onclick="addToCartDetail()" ${book.stock < 1 ? 'disabled style="opacity:0.5"' : ''}>
                            🛒 Thêm vào giỏ hàng
                        </button>
                    </div>

                    <div class="book-meta-grid">
                        <div class="meta-item">
                            <div class="meta-label">Danh mục</div>
                            <div class="meta-value">${book.category_name || '—'}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Thương hiệu</div>
                            <div class="meta-value">${book.brand_name || '—'}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">Kho</div>
                            <div class="meta-value">${book.stock}</div>
                        </div>
                        ${attributesHTML}
                    </div>

                    ${book.description ? `
                        <div class="book-description">
                            <h3>📝 Mô tả chi tiết</h3>
                            <p>${book.description}</p>
                        </div>
                    ` : ''}

                    <div class="reviews-section">
                        <h3>⭐ Đánh giá (${reviews.length})</h3>
                        ${reviews.length > 0 ? reviews.map(r => `
                            <div class="review-card">
                                <div class="review-header">
                                    <span class="review-stars">${'⭐'.repeat(r.rating)}</span>
                                    <span class="review-customer">Khách hàng #${r.customer_id}</span>
                                </div>
                                <div class="review-comment">${r.comment || ''}</div>
                            </div>
                        `).join('') : '<p style="color:var(--text-muted);font-size:0.88rem">Chưa có đánh giá nào</p>'}

                        <div class="review-form-card" id="reviewForm" ${getCustomer() ? '' : 'style="display:none"'}>
                            <h4 style="font-size:0.92rem;margin-bottom:12px">✍️ Viết đánh giá</h4>
                            <div class="star-select" id="starSelect">
                                <span onclick="setRating(1)">⭐</span>
                                <span onclick="setRating(2)">⭐</span>
                                <span onclick="setRating(3)">⭐</span>
                                <span onclick="setRating(4)">⭐</span>
                                <span onclick="setRating(5)">⭐</span>
                            </div>
                            <textarea class="form-control" id="reviewComment" rows="3" placeholder="Nhận xét của bạn..." style="margin-bottom:12px"></textarea>
                            <button class="btn btn-navy btn-sm" onclick="submitReview()">Gửi đánh giá</button>
                        </div>
                    </div>
                </div>
            `;

            setRating(5);
        } catch(e) {
            document.getElementById('bookDetail').innerHTML = `
                <div class="empty-state" style="grid-column:1/-1">
                    <div class="empty-icon">😢</div>
                    <div class="empty-title">Không tìm thấy sách</div>
                    <div class="empty-desc">${e.message}</div>
                    <a href="/store/" class="btn btn-primary">← Về trang chủ</a>
                </div>
            `;
        }
    }

    function changeQty(delta) {
        const inp = document.getElementById('qtyInput');
        const max = parseInt(inp.max || '999', 10);
        const v = Math.max(1, Math.min(max, parseInt(inp.value || 1) + delta));
        inp.value = v;
    }

    function setRating(n) {
        selectedRating = n;
        document.querySelectorAll('#starSelect span').forEach((s, i) => {
            s.classList.toggle('active', i < n);
        });
    }

    async function addToCartDetail() {
        const c = getCustomer();
        if (!c) { window.location.href = '/store/login/?next=' + encodeURIComponent(window.location.pathname); return; }

        const qtyInput = document.getElementById('qtyInput');
        const qty = parseInt(qtyInput.value) || 1;
        const max = parseInt(qtyInput.max || '999', 10);
        if (qty > max) {
            showToast(`Chỉ còn ${max} cuốn trong kho`, 'error');
            return;
        }
        try {
            await apiCall('/api/proxy/cart-items/', 'POST', {
                customer_id: c.id,
                book_id: PRODUCT_ID,
                quantity: qty
            });
            showToast(`Đã thêm ${qty} sản phẩm vào giỏ hàng! 🛒`);
            loadCartCount();
        } catch(e) {
            showToast('Lỗi: ' + e.message, 'error');
        }
    }

    async function submitReview() {
        const c = getCustomer();
        if (!c) return;
        const comment = document.getElementById('reviewComment').value.trim();
        try {
            await apiCall('/api/proxy/reviews/', 'POST', {
                book_id: PRODUCT_ID,
                customer_id: c.id,
                rating: selectedRating,
                comment: comment
            });
            showToast('Đã gửi đánh giá! ⭐');
            setTimeout(() => location.reload(), 1000);
        } catch(e) {
            showToast('Lỗi: ' + e.message, 'error');
        }
    }

    loadBook();
</script>
{% endblock %}
