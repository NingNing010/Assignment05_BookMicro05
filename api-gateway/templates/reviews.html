{% extends "base.html" %}
{% block title %}Reviews{% endblock %}
{% block nav_reviews %}active{% endblock %}
{% block page_title %}⭐ Reviews{% endblock %}
{% block content %}
<div class="card"><div class="table-wrapper"><table>
    <thead><tr><th>ID</th><th>Book</th><th>Customer</th><th>Rating</th><th>Comment</th></tr></thead>
    <tbody id="tableBody"><tr><td colspan="5" style="text-align:center;color:#666;">Loading...</td></tr></tbody>
</table></div></div>
{% endblock %}
{% block scripts %}
<script>
function stars(n){return '⭐'.repeat(n)+'☆'.repeat(5-n);}
async function loadData(){try{const r=await fetch('/api/proxy/reviews/');const items=await r.json();const t=document.getElementById('tableBody');if(!items.length){t.innerHTML='<tr><td colspan="5"><div class="empty-state"><div class="icon">⭐</div><p>No reviews yet.</p></div></td></tr>';return;}t.innerHTML=items.map(rv=>`<tr><td>#${rv.id}</td><td>Book #${rv.book_id}</td><td>Customer #${rv.customer_id||'—'}</td><td style="color:#f39c12;">${stars(rv.rating)} ${rv.rating}/5</td><td>${rv.comment||'—'}</td></tr>`).join('');}catch(e){document.getElementById('tableBody').innerHTML='<tr><td colspan="5" style="color:#e94560;">Failed</td></tr>';}}
loadData();
</script>
{% endblock %}
