{% extends "base.html" %}
{% block title %}Orders{% endblock %}
{% block nav_orders %}active{% endblock %}
{% block page_title %}📦 Orders{% endblock %}

{% block content %}
<div class="card">
    <div class="table-wrapper">
        <table>
            <thead><tr><th>Order ID</th><th>Customer</th><th>Status</th><th>Total</th><th>Date</th><th>Actions</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="5" style="text-align:center;color:#666;">Loading...</td></tr></tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const API = '/api/proxy/orders';
const CUSTOMER_API = '/api/proxy/customers/';
const statusTags = { pending:'tag-orange', confirmed:'tag-blue', shipped:'tag-purple', delivered:'tag-green', cancelled:'tag-red' };
const statusLabels = { pending:'Chờ xử lý', confirmed:'Đã xác nhận', shipped:'Đang giao', delivered:'Đã giao', cancelled:'Đã hủy' };

function actionButtons(o) {
    const btns = [];
    if (o.status === 'pending') {
        btns.push(`<button class="btn btn-sm btn-success" onclick="updateStatus(${o.id},'confirmed')">✅ Xác nhận</button>`);
        btns.push(`<button class="btn btn-sm btn-danger" onclick="updateStatus(${o.id},'cancelled')">❌ Hủy</button>`);
    } else if (o.status === 'confirmed') {
        btns.push(`<button class="btn btn-sm btn-blue" onclick="updateStatus(${o.id},'shipped')">🚚 Giao hàng</button>`);
        btns.push(`<button class="btn btn-sm btn-danger" onclick="updateStatus(${o.id},'cancelled')">❌ Hủy</button>`);
    } else if (o.status === 'shipped') {
        btns.push(`<button class="btn btn-sm btn-success" onclick="updateStatus(${o.id},'delivered')">📬 Đã nhận</button>`);
    }
    return btns.join(' ') || '<span style="color:#666;">—</span>';
}

async function loadData() {
    try {
        const ordersRes = await fetch(API + '/');
        const items = await ordersRes.json();

        let customers = [];
        try {
            const customersRes = await fetch(CUSTOMER_API);
            const rawCustomers = await customersRes.json();
            if (Array.isArray(rawCustomers)) {
                customers = rawCustomers;
            } else if (Array.isArray(rawCustomers.results)) {
                customers = rawCustomers.results;
            } else if (Array.isArray(rawCustomers.value)) {
                customers = rawCustomers.value;
            } else {
                customers = [];
            }
        } catch (e) {
            customers = [];
        }
        const customerMap = {};
        (Array.isArray(customers) ? customers : []).forEach(c => {
            customerMap[String(c.id)] = c;
        });

        // Fallback: if customer list is empty/unavailable, fetch customer details by order ids.
        if (Object.keys(customerMap).length === 0 && Array.isArray(items) && items.length) {
            const ids = [...new Set(items.map(o => String(o.customer_id)).filter(Boolean))];
            await Promise.all(ids.map(async (id) => {
                try {
                    const r = await fetch(`/api/proxy/customers/${id}/`);
                    if (!r.ok) return;
                    const c = await r.json();
                    if (c && c.id !== undefined) {
                        customerMap[String(c.id)] = c;
                    }
                } catch (e) {}
            }));
        }

        const tbody = document.getElementById('tableBody');
        if (!items.length) { tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="icon">📦</div><p>No orders yet.</p></div></td></tr>'; return; }
        tbody.innerHTML = items.map(o => `<tr>
            <td><strong>#${o.id}</strong></td>
            <td>${(() => {
                const customerId = String(o.customer_id);
                const customer = customerMap[customerId];
                if (!customer) return `Customer #${customerId}`;
                const label = customer.full_name || customer.name || customer.email || `Customer #${customerId}`;
                return `${label} (Customer #${customerId})`;
            })()}</td>
            <td><span class="tag ${statusTags[o.status]||'tag-blue'}">${statusLabels[o.status]||o.status}</span></td>
            <td><span class="tag tag-green">${Number(o.total_amount||0).toLocaleString('vi-VN')} đ</span></td>
            <td style="white-space:nowrap;">${o.created_at ? new Date(o.created_at).toLocaleDateString('vi-VN') : ''}</td>
            <td style="white-space:nowrap;">${actionButtons(o)}</td>
        </tr>`).join('');
    } catch(e) { document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" style="color:#e94560;">Failed to load</td></tr>'; }
}

async function updateStatus(id, newStatus) {
    const labels = { confirmed:'Xác nhận', shipped:'Giao hàng', delivered:'Đã nhận', cancelled:'Hủy' };
    if (!confirm(`${labels[newStatus]} đơn hàng #${id}?`)) return;
    const r = await apiCall(`${API}/${id}/`, 'PATCH', {status: newStatus});
    if (r.ok) {
        showToast(`Đơn #${id}: ${statusLabels[newStatus]}! ✅`);
        loadData();
    } else {
        showToast(r.data?.error || JSON.stringify(r.data), 'error');
    }
}

loadData();
</script>
{% endblock %}
