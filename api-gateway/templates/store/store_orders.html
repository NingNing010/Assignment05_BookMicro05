{% extends "store/store_base.html" %}
{% block title %}Đơn hàng của tôi{% endblock %}
{% block nav_orders %}active{% endblock %}

{% block extra_css %}
<style>
    .order-card {
        background: var(--bg-white);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        margin-bottom: 16px;
        overflow: hidden;
    }

    .order-header {
        padding: 16px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--bg-light);
        border-bottom: 1px solid var(--border);
    }

    .order-id {
        font-weight: 700;
        font-size: 0.95rem;
    }

    .order-date {
        font-size: 0.82rem;
        color: var(--text-muted);
    }

    .order-body {
        padding: 20px 24px;
    }

    .order-items-list {
        margin-bottom: 16px;
    }

    .order-item-row {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        font-size: 0.88rem;
        border-bottom: 1px solid var(--border);
    }

    .order-item-row:last-child { border-bottom: none; }

    .order-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: 16px;
        border-top: 1px solid var(--border);
    }

    .order-total {
        font-size: 1.1rem;
        font-weight: 800;
        color: var(--accent);
    }

    .order-actions { display: flex; gap: 8px; }

    /* Status colors */
    .status-pending { background: #fff3e0; color: #e67e22; }
    .status-confirmed { background: #e8f0fd; color: #2471a3; }
    .status-shipped { background: #f3e8fd; color: #8e44ad; }
    .status-delivered { background: #e8f8f0; color: #1a7d48; }
    .status-cancelled { background: #fde8e8; color: #c0392b; }
</style>
{% endblock %}

{% block content %}
<section class="section">
    <div class="section-header">
        <div>
            <div class="section-title">📦 Đơn hàng của tôi</div>
            <div class="section-subtitle" id="orderSubtitle">Đang tải...</div>
        </div>
    </div>
    <div id="ordersList">
        <div class="spinner"></div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    const statusMap = {
        pending: { label: 'Chờ xác nhận', cls: 'status-pending', icon: '🕐' },
        confirmed: { label: 'Đã xác nhận', cls: 'status-confirmed', icon: '✅' },
        shipped: { label: 'Đang giao', cls: 'status-shipped', icon: '🚚' },
        delivered: { label: 'Đã giao', cls: 'status-delivered', icon: '📬' },
        cancelled: { label: 'Đã hủy', cls: 'status-cancelled', icon: '❌' },
    };

    async function loadOrders() {
        if (!requireLogin()) return;
        const c = getCustomer();

        try {
            const orders = await apiCall('/api/proxy/orders/');
            const allOrders = Array.isArray(orders) ? orders : [];
            const myOrders = allOrders.filter(o => o.customer_id === c.id);

            document.getElementById('orderSubtitle').textContent = `${myOrders.length} đơn hàng`;

            if (myOrders.length === 0) {
                document.getElementById('ordersList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📦</div>
                        <div class="empty-title">Chưa có đơn hàng</div>
                        <div class="empty-desc">Hãy mua sắm và đặt hàng nhé!</div>
                        <a href="/store/" class="btn btn-primary">📚 Mua sắm ngay</a>
                    </div>
                `;
                return;
            }

            // Sort newest first
            myOrders.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            document.getElementById('ordersList').innerHTML = myOrders.map(o => {
                const st = statusMap[o.status] || statusMap.pending;
                const items = o.items || [];
                const date = o.created_at ? new Date(o.created_at).toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';

                return `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <span class="order-id">Đơn hàng #${o.id}</span>
                                <span class="order-date" style="margin-left:12px">${date}</span>
                            </div>
                            <span class="tag ${st.cls}">${st.icon} ${st.label}</span>
                        </div>
                        <div class="order-body">
                            <div class="order-items-list">
                                ${items.length > 0 ? items.map(item => `
                                    <div class="order-item-row">
                                        <span>📖 Sách #${item.book_id} × ${item.quantity}</span>
                                        <span style="font-weight:600">${formatPrice(item.price)} ₫</span>
                                    </div>
                                `).join('') : '<div style="color:var(--text-muted);font-size:0.85rem">Không có chi tiết</div>'}
                            </div>
                            <div class="order-footer">
                                <div class="order-total">Tổng: ${formatPrice(o.total_amount)} ₫</div>
                                <div class="order-actions">
                                    ${o.status === 'shipped' ? `<button class="btn btn-success btn-sm" onclick="updateOrder(${o.id},'delivered')">📬 Đã nhận hàng</button>` : ''}
                                    ${o.status === 'pending' ? `<button class="btn btn-danger btn-sm" onclick="updateOrder(${o.id},'cancelled')">❌ Hủy đơn</button>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        } catch(e) {
            document.getElementById('ordersList').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">😢</div>
                    <div class="empty-title">Lỗi tải đơn hàng</div>
                    <div class="empty-desc">${e.message}</div>
                </div>
            `;
        }
    }

    async function updateOrder(orderId, newStatus) {
        const msgs = { cancelled: 'Bạn có chắc muốn hủy đơn hàng này?', delivered: 'Xác nhận đã nhận hàng?' };
        if (!confirm(msgs[newStatus] || 'Xác nhận?')) return;
        try {
            await apiCall(`/api/proxy/orders/${orderId}/`, 'PATCH', {status: newStatus});
            const labels = { cancelled: 'Đã hủy đơn hàng', delivered: 'Đã xác nhận nhận hàng! 📬' };
            showToast(labels[newStatus] || 'Cập nhật thành công');
            loadOrders();
        } catch(e) {
            showToast('Lỗi: ' + e.message, 'error');
        }
    }

    loadOrders();
</script>
{% endblock %}
