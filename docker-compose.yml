services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  auth-service:
    build: ./auth-service
    ports:
      - "8012:8000"
    environment:
      - JWT_SECRET=bookstore-jwt-secret
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USER=bookstore_user
      - DB_PASSWORD=mattroi010
      - DB_NAME=bookstore_auth

  # ── Product Service (DDD) ──────────────────────
  # Replaces: book-service, clothes-service, catalog-service
  # Bounded Context: Catalog (Product)
  product-service:
    build: ./product-service
    ports:
      - "8002:8000"
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USER=bookstore_user
      - DB_PASSWORD=mattroi010
      - DB_NAME=bookstore_product

  cart-service:
    build: ./cart-service
    ports:
      - "8003:8000"
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USER=bookstore_user
      - DB_PASSWORD=mattroi010
      - DB_NAME=bookstore_cart
    depends_on:
      - product-service

  customer-service:
    build: ./customer-service
    ports:
      - "8001:8000"
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USER=bookstore_user
      - DB_PASSWORD=mattroi010
      - DB_NAME=bookstore_customer
    depends_on:
      - cart-service

  staff-service:
    build: ./staff-service
    ports:
      - "8004:8000"
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USER=bookstore_user
      - DB_PASSWORD=mattroi010
      - DB_NAME=bookstore_staff
    depends_on:
      - product-service

  manager-service:
    build: ./manager-service
    ports:
      - "8005:8000"
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USER=bookstore_user
      - DB_PASSWORD=mattroi010
      - DB_NAME=bookstore_manager
    depends_on:
      - staff-service

  pay-service:
    build: ./pay-service
    ports:
      - "8009:8000"
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USER=bookstore_user
      - DB_PASSWORD=mattroi010
      - DB_NAME=bookstore_pay

  ship-service:
    build: ./ship-service
    ports:
      - "8008:8000"
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USER=bookstore_user
      - DB_PASSWORD=mattroi010
      - DB_NAME=bookstore_ship

  order-service:
    build: ./order-service
    ports:
      - "8007:8000"
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USER=bookstore_user
      - DB_PASSWORD=mattroi010
      - DB_NAME=bookstore_order
      - RABBITMQ_ENABLED=true
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_EXCHANGE=bookstore.events
    depends_on:
      - rabbitmq
      - pay-service
      - ship-service
      - cart-service

  comment-rate-service:
    build: ./comment-rate-service
    ports:
      - "8010:8000"
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USER=bookstore_user
      - DB_PASSWORD=mattroi010
      - DB_NAME=bookstore_comment_rate
    depends_on:
      - product-service

  recommender-ai-service:
    build: ./recommender-ai-service
    ports:
      - "8011:8000"
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USER=bookstore_user
      - DB_PASSWORD=mattroi010
      - DB_NAME=bookstore_recommender
    depends_on:
      - product-service
      - comment-rate-service

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET=bookstore-jwt-secret
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
      - DB_USER=bookstore_user
      - DB_PASSWORD=mattroi010
      - DB_NAME=bookstore_gateway
    depends_on:
      - auth-service
      - customer-service
      - product-service
      - cart-service
      - staff-service
      - manager-service
      - order-service
      - ship-service
      - pay-service
      - comment-rate-service
      - recommender-ai-service
