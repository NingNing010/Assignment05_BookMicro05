{% extends "store/store_base.html" %}
{% block title %}Tất cả sách{% endblock %}
{% block nav_books %}active{% endblock %}

{% block extra_css %}
<style>
    .filter-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 24px;
    }

    .filter-chip {
        padding: 8px 18px;
        border-radius: 24px;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        border: 2px solid var(--border);
        background: var(--bg-white);
        color: var(--text-body);
        font-family: inherit;
    }

    .filter-chip:hover { border-color: var(--navy); }
    .filter-chip.active { background: var(--navy); color: #fff; border-color: var(--navy); }

    .sort-select {
        margin-left: auto;
        padding: 8px 16px;
        border: 2px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 0.85rem;
        font-family: inherit;
        color: var(--text-dark);
        cursor: pointer;
        outline: none;
        background: var(--bg-white);
    }

    .book-popup-overlay {
        position: fixed;
        inset: 0;
        background: rgba(14, 18, 29, 0.55);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        padding: 16px;
    }

    .book-popup-overlay.show { display: flex; }

    .book-popup {
        width: min(760px, 100%);
        max-height: 90vh;
        overflow: auto;
        background: var(--bg-white);
        border-radius: var(--radius);
        box-shadow: var(--shadow-lg);
        padding: 22px;
    }

    .btn-add-cart[disabled] {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
    }
</style>
{% endblock %}

{% block content %}
<section class="section">
    <div class="section-header">
        <div>
            <div class="section-title">📚 Tất cả sách</div>
            <div class="section-subtitle" id="bookCount">Đang tải...</div>
        </div>
    </div>

    <div class="filter-bar" id="filterBar">
        <button class="filter-chip active" onclick="filterCategory(null, this)">Tất cả</button>
        <select class="sort-select" id="sortSelect" onchange="applySort()">
            <option value="newest">Mới nhất</option>
            <option value="price-low">Giá thấp → cao</option>
            <option value="price-high">Giá cao → thấp</option>
            <option value="name">Tên A → Z</option>
        </select>
    </div>

    <div class="books-grid" id="booksGrid">
        <div class="spinner"></div>
    </div>
</section>

<div class="book-popup-overlay" id="bookPopup" onclick="if(event.target===this)closeBookPopup()">
    <div class="book-popup" id="bookPopupContent"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let allBooks = [];
    let currentFilter = null;

    async function loadData() {
        try {
            const [booksRes, catsRes] = await Promise.all([
                fetch('/api/proxy/books/'),
                fetch('/api/proxy/categories/')
            ]);
            allBooks = await booksRes.json();
            const categories = await catsRes.json();

            // Add category chips
            const bar = document.getElementById('filterBar');
            const sortSel = bar.querySelector('.sort-select');
            (Array.isArray(categories) ? categories : []).forEach(c => {
                const btn = document.createElement('button');
                btn.className = 'filter-chip';
                btn.textContent = c.name;
                btn.onclick = function() { filterCategory(c.name, this); };
                bar.insertBefore(btn, sortSel);
            });

            renderBooks(allBooks);
        } catch(e) {
            document.getElementById('booksGrid').innerHTML = `
                <div class="empty-state" style="grid-column:1/-1">
                    <div class="empty-icon">😢</div>
                    <div class="empty-title">Không thể tải dữ liệu</div>
                </div>`;
        }
    }

    function filterCategory(cat, btn) {
        currentFilter = cat;
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        if (btn) btn.classList.add('active');
        applySort();
    }

    function applySort() {
        let books = currentFilter ? allBooks.filter(b => b.category_name === currentFilter) : [...allBooks];
        const sort = document.getElementById('sortSelect').value;
        switch(sort) {
            case 'price-low': books.sort((a,b) => a.price - b.price); break;
            case 'price-high': books.sort((a,b) => b.price - a.price); break;
            case 'name': books.sort((a,b) => a.title.localeCompare(b.title)); break;
            default: books.sort((a,b) => (b.id || 0) - (a.id || 0));
        }
        renderBooks(books);
    }

    function renderBooks(books) {
        document.getElementById('bookCount').textContent = `${books.length} tựa sách`;
        const grid = document.getElementById('booksGrid');

        if (books.length === 0) {
            grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📚</div><div class="empty-title">Không có sách nào</div></div>`;
            return;
        }

        grid.innerHTML = books.map((b, i) => {
            const stockClass = b.stock > 5 ? 'in-stock' : b.stock > 0 ? 'low-stock' : 'out-of-stock';
            const stockText = b.stock > 5 ? 'Còn hàng' : b.stock > 0 ? `Còn ${b.stock}` : 'Hết hàng';
            return `
                <div class="book-card" onclick="openBookPopup(${b.id})">
                    <div class="book-card-cover ${gradClass(i)}">
                        <div class="book-icon">📖</div>
                        ${b.category_name ? `<span class="category-tag">${b.category_name}</span>` : ''}
                        <span class="stock-tag ${stockClass}">${stockText}</span>
                    </div>
                    <div class="book-card-body">
                        <div class="book-card-title">${b.title}</div>
                        <div class="book-card-author">✍️ ${b.author}</div>
                        <div class="book-card-footer">
                            <div class="book-card-price">${formatPrice(b.price)} <span class="currency">₫</span></div>
                            <button class="btn-add-cart" ${b.stock < 1 ? 'disabled' : ''} onclick="event.stopPropagation();addToCart(${b.id})">${b.stock < 1 ? 'Hết hàng' : '🛒 Thêm'}</button>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    async function openBookPopup(bookId) {
        const popup = document.getElementById('bookPopup');
        const content = document.getElementById('bookPopupContent');
        popup.classList.add('show');
        content.innerHTML = '<div class="spinner"></div>';
        try {
            const book = await apiCall(`/api/proxy/books/${bookId}/`);
            const out = (book.stock || 0) < 1;
            content.innerHTML = `
                <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:12px">
                    <div>
                        <h3 style="font-size:1.25rem">${book.title}</h3>
                        <div style="color:var(--text-muted);margin-top:4px">✍️ ${book.author}</div>
                    </div>
                    <button class="btn btn-outline btn-sm" onclick="closeBookPopup()">Đóng</button>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
                    <div class="meta-item"><div class="meta-label">Giá</div><div class="meta-value">${formatPrice(book.price)} ₫</div></div>
                    <div class="meta-item"><div class="meta-label">Tồn kho</div><div class="meta-value">${book.stock}</div></div>
                    <div class="meta-item"><div class="meta-label">Danh mục</div><div class="meta-value">${book.category_name || '—'}</div></div>
                    <div class="meta-item"><div class="meta-label">NXB</div><div class="meta-value">${book.publisher_name || '—'}</div></div>
                </div>
                <div style="font-size:0.9rem;color:var(--text-body);line-height:1.7">${book.description || 'Chưa có mô tả.'}</div>
                <div style="display:flex;gap:10px;margin-top:16px">
                    <button class="btn btn-primary" ${out ? 'disabled' : ''} onclick="addToCart(${book.id})">${out ? 'Hết hàng' : '🛒 Thêm vào giỏ'}</button>
                    <a class="btn btn-outline" href="/store/book/${book.id}/">Xem trang chi tiết</a>
                </div>
            `;
        } catch (e) {
            content.innerHTML = `<div style="color:#c0392b">Không thể tải chi tiết sách: ${e.message}</div>`;
        }
    }

    function closeBookPopup() {
        document.getElementById('bookPopup').classList.remove('show');
    }

    async function addToCart(bookId) {
        const c = getCustomer();
        if (!c) { window.location.href = '/store/login/?next=' + encodeURIComponent(window.location.pathname); return; }
        const book = (allBooks || []).find(b => Number(b.id) === Number(bookId));
        if (book && Number(book.stock || 0) < 1) {
            showToast('Sách đã hết hàng, không thể thêm vào giỏ', 'error');
            return;
        }
        try {
            await apiCall('/api/proxy/cart-items/', 'POST', { customer_id: c.id, book_id: bookId, quantity: 1 });
            showToast('Đã thêm vào giỏ hàng! 🛒');
            loadCartCount();
        } catch(e) { showToast('Lỗi: ' + e.message, 'error'); }
    }

    loadData();
</script>
{% endblock %}
