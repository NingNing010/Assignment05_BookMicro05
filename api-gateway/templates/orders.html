{% extends "base.html" %}
{% block title %}Orders{% endblock %}
{% block nav_orders %}active{% endblock %}
{% block page_title %}📦 Orders{% endblock %}

{% block content %}
<div class="card">
    <div class="table-wrapper">
        <table>
            <thead><tr><th>Order ID</th><th>Customer</th><th>Status</th><th>Total</th><th>Actions</th></tr></thead>
            <tbody id="tableBody"><tr><td colspan="5" style="text-align:center;color:#666;">Loading...</td></tr></tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const API = '/api/proxy/orders';
const statusTags = { pending:'tag-orange', processing:'tag-blue', shipped:'tag-purple', delivered:'tag-green', cancelled:'tag-red' };
async function loadData() {
    try {
        const res = await fetch(API + '/'); const items = await res.json();
        const tbody = document.getElementById('tableBody');
        if (!items.length) { tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="icon">📦</div><p>No orders yet.</p></div></td></tr>'; return; }
        tbody.innerHTML = items.map(o => `<tr>
            <td><strong>#${o.id}</strong></td>
            <td>Customer #${o.customer_id}</td>
            <td><span class="tag ${statusTags[o.status]||'tag-blue'}">${o.status}</span></td>
            <td><span class="tag tag-green">$${o.total_amount||'0.00'}</span></td>
            <td>${o.status !== 'shipped' && o.status !== 'delivered' ? '<button class="btn btn-sm btn-danger" onclick="cancelOrder('+o.id+')">❌ Cancel</button>' : ''}</td>
        </tr>`).join('');
    } catch(e) { document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" style="color:#e94560;">Failed to load</td></tr>'; }
}
async function cancelOrder(id) {
    if (!confirm('Cancel order #'+id+'?')) return;
    const r = await apiCall(`${API}/${id}/`, 'PATCH', {status:'cancelled'});
    if (r.ok) { showToast('Order cancelled!'); loadData(); } else { showToast(JSON.stringify(r.data), 'error'); }
}
loadData();
</script>
{% endblock %}
