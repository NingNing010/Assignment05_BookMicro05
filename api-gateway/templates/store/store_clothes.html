{% extends "store/store_base.html" %}
{% block title %}Tất cả quần áo{% endblock %}
{% block nav_clothes %}active{% endblock %}

{% block extra_css %}
<style>
    .filter-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 24px;
    }

    .filter-chip {
        padding: 8px 18px;
        border-radius: 24px;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        border: 2px solid var(--border);
        background: var(--bg-white);
        color: var(--text-body);
        font-family: inherit;
    }

    .filter-chip:hover { border-color: var(--navy); }
    .filter-chip.active { background: var(--navy); color: #fff; border-color: var(--navy); }

    .sort-select {
        margin-left: auto;
        padding: 8px 16px;
        border: 2px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 0.85rem;
        font-family: inherit;
        color: var(--text-dark);
        cursor: pointer;
        outline: none;
        background: var(--bg-white);
    }

    .search-input {
        padding: 8px 14px;
        border: 2px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 0.85rem;
        min-width: 260px;
        font-family: inherit;
        outline: none;
        background: var(--bg-white);
    }

    .btn-add-cart[disabled] {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
    }

    .cover-media {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: inherit;
        display: block;
    }
</style>
{% endblock %}

{% block content %}
<section class="section">
    <div class="section-header">
        <div>
            <div class="section-title">👕 Tất cả quần áo</div>
            <div class="section-subtitle" id="productCount">Đang tải...</div>
        </div>
    </div>

    <div class="filter-bar">
        <button class="filter-chip active" onclick="resetFilter(this)">Tất cả</button>
        <input class="search-input" id="searchInput" placeholder="Tìm theo tên, thương hiệu, màu sắc..." oninput="applySort()">
        <select class="sort-select" id="sortSelect" onchange="applySort()">
            <option value="newest">Mới nhất</option>
            <option value="price-low">Giá thấp → cao</option>
            <option value="price-high">Giá cao → thấp</option>
            <option value="name">Tên A → Z</option>
        </select>
    </div>

    <div class="books-grid" id="productsGrid">
        <div class="spinner"></div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
    let allClothes = [];
    let currentFilter = null;

    async function loadData() {
        try {
            const res = await fetch('/api/proxy/clothes/');
            allClothes = await res.json();
            if (!Array.isArray(allClothes)) allClothes = [];
            renderProducts(allClothes);
        } catch(e) {
            document.getElementById('productsGrid').innerHTML = `
                <div class="empty-state" style="grid-column:1/-1">
                    <div class="empty-icon">😢</div>
                    <div class="empty-title">Không thể tải dữ liệu</div>
                </div>`;
        }
    }

    function resetFilter(btn) {
        currentFilter = null;
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        applySort();
    }

    function applySort() {
        let products = currentFilter ? allClothes.filter(c => c.brand === currentFilter) : [...allClothes];
        const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
        if (q) {
            products = products.filter(p => [p.name, p.brand, p.size, p.color, p.description].join(' ').toLowerCase().includes(q));
        }
        const sort = document.getElementById('sortSelect').value;
        switch(sort) {
            case 'price-low': products.sort((a,b) => a.price - b.price); break;
            case 'price-high': products.sort((a,b) => b.price - a.price); break;
            case 'name': products.sort((a,b) => (a.name || '').localeCompare(b.name || '')); break;
            default: products.sort((a,b) => (b.id || 0) - (a.id || 0));
        }
        renderProducts(products);
    }

    function renderProducts(products) {
        document.getElementById('productCount').textContent = `${products.length} sản phẩm hiện có`;
        const grid = document.getElementById('productsGrid');

        if (products.length === 0) {
            grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">👕</div><div class="empty-title">Không có quần áo nào</div></div>`;
            return;
        }

        grid.innerHTML = products.map((item, i) => {
            const encodedId = CLOTHES_ID_OFFSET + Number(item.id);
            const stockClass = item.stock > 5 ? 'in-stock' : item.stock > 0 ? 'low-stock' : 'out-of-stock';
            const stockText = item.stock > 5 ? 'Còn hàng' : item.stock > 0 ? `Còn ${item.stock}` : 'Hết hàng';
            return `
                <div class="book-card" onclick="window.location='/store/clothes/${encodedId}/'">
                    <div class="book-card-cover ${gradClass(i)}">
                        ${item.image_url ? `<img class="cover-media" src="${item.image_url}" alt="${item.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">` : ''}
                        <div class="book-icon" style="display:${item.image_url ? 'none' : 'flex'}">👕</div>
                        <span class="stock-tag ${stockClass}">${stockText}</span>
                    </div>
                    <div class="book-card-body">
                        <div class="book-card-title">${item.name}</div>
                        <div class="book-card-author">🏷️ ${item.brand || '—'} • ${item.size || '—'} • ${item.color || '—'}</div>
                        <div class="book-card-footer">
                            <div class="book-card-price">${formatPrice(item.price)} <span class="currency">₫</span></div>
                            <button class="btn-add-cart" ${item.stock < 1 ? 'disabled' : ''} onclick="event.stopPropagation();addToCart(${encodedId})">${item.stock < 1 ? 'Hết hàng' : '🛒 Thêm'}</button>
                        </div>
                    </div>
                </div>`;
        }).join('');
    }

    async function addToCart(productId) {
        const c = getCustomer();
        if (!c) { window.location.href = '/store/login/?next=' + encodeURIComponent(window.location.pathname); return; }
        try {
            await apiCall('/api/proxy/cart-items/', 'POST', {
                customer_id: c.id,
                book_id: productId,
                quantity: 1
            });
            showToast('Đã thêm vào giỏ hàng! 🛒');
            loadCartCount();
        } catch(e) {
            showToast('Không thể thêm: ' + e.message, 'error');
        }
    }

    loadData();
</script>
{% endblock %}
