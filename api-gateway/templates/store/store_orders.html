{% extends "store/store_base.html" %}
{% block title %}Đơn hàng của tôi{% endblock %}
{% block nav_orders %}active{% endblock %}

{% block extra_css %}
<style>
    .order-card {
        background: var(--bg-white);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        margin-bottom: 16px;
        overflow: hidden;
    }

    .order-header {
        padding: 16px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--bg-light);
        border-bottom: 1px solid var(--border);
    }

    .order-id {
        font-weight: 700;
        font-size: 0.95rem;
    }

    .order-date {
        font-size: 0.82rem;
        color: var(--text-muted);
    }

    .order-body {
        padding: 20px 24px;
    }

    .order-items-list {
        margin-bottom: 16px;
    }

    .order-item-row {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        font-size: 0.88rem;
        border-bottom: 1px solid var(--border);
    }

    .order-item-row:last-child { border-bottom: none; }

    .order-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: 16px;
        border-top: 1px solid var(--border);
    }

    .order-total {
        font-size: 1.1rem;
        font-weight: 800;
        color: var(--accent);
    }

    .order-actions { display: flex; gap: 8px; }

    .orders-pagination {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-top: 18px;
        flex-wrap: wrap;
    }

    .orders-pagination button {
        min-width: 36px;
        height: 36px;
        border: 2px solid var(--border);
        background: var(--bg-white);
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-family: inherit;
        font-weight: 600;
        color: var(--text-dark);
    }

    .orders-pagination button.active {
        border-color: var(--navy);
        background: var(--navy);
        color: #fff;
    }

    .order-detail-overlay {
        position: fixed;
        inset: 0;
        background: rgba(14, 18, 29, 0.55);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        padding: 16px;
    }

    .order-detail-overlay.show { display: flex; }

    .order-detail-panel {
        width: min(760px, 100%);
        max-height: 90vh;
        overflow: auto;
        background: var(--bg-white);
        border-radius: var(--radius);
        box-shadow: var(--shadow-lg);
        padding: 22px;
    }

    .order-detail-row {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding: 10px 0;
        border-bottom: 1px solid var(--border);
        align-items: center;
    }

    .order-detail-row:last-child { border-bottom: none; }

    .order-detail-item-title {
        font-weight: 700;
        margin-bottom: 2px;
    }

    .order-detail-item-meta {
        color: var(--text-muted);
        font-size: 0.82rem;
    }

    .order-detail-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 18px;
        gap: 12px;
        flex-wrap: wrap;
    }

    /* Status colors */
    .status-pending { background: #fff3e0; color: #e67e22; }
    .status-confirmed { background: #e8f0fd; color: #2471a3; }
    .status-shipped { background: #f3e8fd; color: #8e44ad; }
    .status-delivered { background: #e8f8f0; color: #1a7d48; }
    .status-cancelled { background: #fde8e8; color: #c0392b; }
</style>
{% endblock %}

{% block content %}
<section class="section">
    <div class="section-header">
        <div>
            <div class="section-title">📦 Đơn hàng của tôi</div>
            <div class="section-subtitle" id="orderSubtitle">Đang tải...</div>
        </div>
    </div>
    <div id="ordersList">
        <div class="spinner"></div>
    </div>
</section>

<div class="order-detail-overlay" id="orderDetailOverlay" onclick="if(event.target===this)closeOrderDetail()">
    <div class="order-detail-panel" id="orderDetailPanel"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const statusMap = {
        pending: { label: 'Chờ xác nhận', cls: 'status-pending', icon: '🕐' },
        confirmed: { label: 'Đã xác nhận', cls: 'status-confirmed', icon: '✅' },
        shipped: { label: 'Đang giao', cls: 'status-shipped', icon: '🚚' },
        delivered: { label: 'Đã giao', cls: 'status-delivered', icon: '📬' },
        cancelled: { label: 'Đã hủy', cls: 'status-cancelled', icon: '❌' },
    };
    let ordersCache = [];
    let currentPage = 1;
    const pageSize = 5;

    async function loadOrders() {
        if (!requireLogin()) return;
        const c = getCustomer();

        try {
            const payload = await apiCall(`/api/proxy/orders/?customer_id=${c.id}&page=${currentPage}&page_size=${pageSize}`);
            const myOrders = Array.isArray(payload?.results) ? payload.results : [];
            const total = Number(payload?.total || myOrders.length);
            const totalPages = Number(payload?.total_pages || 1);
            ordersCache = myOrders;

            document.getElementById('orderSubtitle').textContent = `${total} đơn hàng`;

            if (total === 0) {
                document.getElementById('ordersList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📦</div>
                        <div class="empty-title">Chưa có đơn hàng</div>
                        <div class="empty-desc">Hãy mua sắm và đặt hàng nhé!</div>
                        <a href="/store/" class="btn btn-primary">📚 Mua sắm ngay</a>
                    </div>
                `;
                return;
            }

            const cardsHtml = myOrders.map(o => {
                const st = statusMap[o.status] || statusMap.pending;
                const date = o.created_at ? new Date(o.created_at).toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
                const itemCount = Array.isArray(o.items) ? o.items.length : 0;

                return `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <span class="order-id">Đơn hàng #${o.id}</span>
                                <span class="order-date" style="margin-left:12px">${date}</span>
                            </div>
                            <span class="tag ${st.cls}">${st.icon} ${st.label}</span>
                        </div>
                        <div class="order-body">
                            <div class="order-footer">
                                <div>
                                    <div class="order-total">Tổng: ${formatPrice(o.total_amount)} ₫</div>
                                    <div style="color:var(--text-muted);font-size:0.85rem;margin-top:4px">${itemCount} sản phẩm</div>
                                </div>
                                <div class="order-actions">
                                    <button class="btn btn-outline btn-sm" onclick="openOrderDetail(${o.id})">🔎 Xem chi tiết</button>
                                    ${o.status === 'shipped' ? `<button class="btn btn-success btn-sm" onclick="updateOrder(${o.id},'delivered')">📬 Đã nhận hàng</button>` : ''}
                                    ${o.status === 'pending' ? `<button class="btn btn-danger btn-sm" onclick="updateOrder(${o.id},'cancelled')">❌ Hủy đơn</button>` : ''}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            const pagingHtml = totalPages > 1
                ? `<div class="orders-pagination">${Array.from({ length: totalPages }, (_, i) => i + 1).map(p => `<button class="${p === currentPage ? 'active' : ''}" onclick="gotoOrderPage(${p})">${p}</button>`).join('')}</div>`
                : '';

            document.getElementById('ordersList').innerHTML = cardsHtml + pagingHtml;
        } catch(e) {
            document.getElementById('ordersList').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">😢</div>
                    <div class="empty-title">Lỗi tải đơn hàng</div>
                    <div class="empty-desc">${e.message}</div>
                </div>
            `;
        }
    }

    function gotoOrderPage(page) {
        currentPage = page;
        loadOrders();
    }

    function closeOrderDetail() {
        document.getElementById('orderDetailOverlay').classList.remove('show');
    }

    async function openOrderDetail(orderId) {
        const order = ordersCache.find(o => Number(o.id) === Number(orderId));
        const panel = document.getElementById('orderDetailPanel');
        const overlay = document.getElementById('orderDetailOverlay');
        overlay.classList.add('show');
        panel.innerHTML = '<div class="spinner"></div>';

        if (!order) {
            panel.innerHTML = '<div class="empty-state"><div class="empty-title">Không tìm thấy đơn hàng</div></div>';
            return;
        }

        const detailedItems = await Promise.all((order.items || []).map(async item => {
            const product = await fetchStoreProductById(item.book_id);
            return { ...item, product };
        }));

        panel.innerHTML = `
            <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:16px">
                <div>
                    <h3 style="font-size:1.2rem">Đơn hàng #${order.id}</h3>
                    <div style="color:var(--text-muted);font-size:0.85rem;margin-top:4px">${order.created_at ? new Date(order.created_at).toLocaleString('vi-VN') : ''}</div>
                </div>
                <button class="btn btn-outline btn-sm" onclick="closeOrderDetail()">Đóng</button>
            </div>
            <div class="order-items-list">
                ${detailedItems.length > 0 ? detailedItems.map(item => {
                    const product = item.product || {};
                    const isClothes = product._type === 'clothes';
                    const icon = isClothes ? '👕' : '📖';
                    const title = formatStoreProductTitle(product) || (isClothes ? `Quần áo #${item.book_id}` : `Sách #${item.book_id}`);
                    const meta = isClothes
                        ? `🏷️ ${product.brand || '—'} • ${product.size || '—'} • ${product.color || '—'}`
                        : `✍️ ${product.author || '—'}`;
                    const subtotal = Number(item.price || 0) * Number(item.quantity || 1);
                    return `
                        <div class="order-detail-row">
                            <div>
                                <div class="order-detail-item-title">${icon} ${title}</div>
                                <div class="order-detail-item-meta">${meta} • Số lượng: ${item.quantity}</div>
                            </div>
                            <div style="font-weight:700">${formatPrice(subtotal)} ₫</div>
                        </div>
                    `;
                }).join('') : '<div style="color:var(--text-muted);font-size:0.85rem">Không có chi tiết</div>'}
            </div>
            <div class="order-detail-footer">
                <div style="font-size:1.05rem;font-weight:800;color:var(--accent)">Tổng: ${formatPrice(order.total_amount)} ₫</div>
                <button class="btn btn-outline btn-sm" onclick="closeOrderDetail()">Đóng</button>
            </div>
        `;
    }

    async function updateOrder(orderId, newStatus) {
        const msgs = { cancelled: 'Bạn có chắc muốn hủy đơn hàng này?', delivered: 'Xác nhận đã nhận hàng?' };
        if (!confirm(msgs[newStatus] || 'Xác nhận?')) return;
        try {
            await apiCall(`/api/proxy/orders/${orderId}/`, 'PATCH', {status: newStatus});
            const labels = { cancelled: 'Đã hủy đơn hàng', delivered: 'Đã xác nhận nhận hàng! 📬' };
            showToast(labels[newStatus] || 'Cập nhật thành công');
            loadOrders();
        } catch(e) {
            showToast('Lỗi: ' + e.message, 'error');
        }
    }

    loadOrders();
</script>
{% endblock %}
