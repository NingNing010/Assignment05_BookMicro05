{% extends "base.html" %}
{% block title %}Shipments{% endblock %}
{% block nav_shipments %}active{% endblock %}
{% block page_title %}🚚 Shipments{% endblock %}
{% block content %}
<div class="card"><div class="table-wrapper"><table>
    <thead><tr><th>ID</th><th>Order</th><th>Method</th><th>Status</th></tr></thead>
    <tbody id="tableBody"><tr><td colspan="4" style="text-align:center;color:#666;">Loading...</td></tr></tbody>
</table></div></div>
{% endblock %}
{% block scripts %}
<script>
async function loadData(){try{const r=await fetch('/api/proxy/shipments/');const items=await r.json();const t=document.getElementById('tableBody');if(!items.length){t.innerHTML='<tr><td colspan="4"><div class="empty-state"><div class="icon">🚚</div><p>No shipments.</p></div></td></tr>';return;}t.innerHTML=items.map(s=>`<tr><td>#${s.id}</td><td>Order #${s.order_id}</td><td><span class="tag tag-blue">${s.method}</span></td><td><span class="tag ${s.status==='delivered'?'tag-green':s.status==='shipped'?'tag-purple':'tag-orange'}">${s.status}</span></td></tr>`).join('');}catch(e){document.getElementById('tableBody').innerHTML='<tr><td colspan="4" style="color:#e94560;">Failed</td></tr>';}}
loadData();
</script>
{% endblock %}
